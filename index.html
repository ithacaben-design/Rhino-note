<!DOCTYPE html>
<html lang="en">

    <title>Turtle Love Infinity</title>

            height: 100vh;
            touch-action: manipulation;
        }

        .stack {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .note-back {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #27ae60;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transform: rotate(-2deg);
        }

        .note-top {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #2ecc71; /* Bright Green */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 24px;
            color: #1e272e;
            z-index: 10;
            user-select: none;
            text-align: center;
            transition: background 0.5s, color 0.5s;
        }
