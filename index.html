<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Origami Pad</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }

        .pad-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        /* The White Stack Pad */
        .white-stack-base {
            position: absolute;
            width: 200px;
            height: 200px;
            background: #ffffff;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 24px;
            color: #bdc3c7;
            cursor: pointer;
            z-index: 50;
            user-select: none;
            border-radius: 2px;
        }

        /* Individual Origami Pieces */
        .peeled-note {
            position: absolute;
            width: 200px;
            height: 200px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            color: #333;
            transition: clip-path 1.2s, background 0.5s;
        }

        /* THE SPIRAL TO THE RIGHT ANIMATION */
        @keyframes spiralRight {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.6);
                opacity: 1;
            }
            25% {
                transform: translate(150px, -100px) rotate(90deg) scale(0.5);
            }
            50% {
                transform: translate(300px, 0px) rotate(180deg) scale(0.4);
            }
            75% {
                transform: translate(450px, 100px) rotate(270deg) scale(0.3);
            }
            100% {
                transform: translate(800px, 0px) rotate(360deg) scale(0.1);
                opacity: 0;
            }
        }

        /* Shapes */
        .lips-shape {
            clip-path: polygon(10% 45%, 30% 30%, 50% 45%, 70% 30%, 90% 45%, 100% 60%, 85% 90%, 50% 100%, 15% 90%, 0% 60%);
        }

        .turtle-shape {
            clip-path: polygon(50% 0%, 80% 20%, 100% 50%, 80% 80%, 50% 100%, 20% 80%, 0% 50%, 20% 20%);
        }

        .kite-shape {
            clip-path: polygon(50% 0%, 100% 45%, 50% 100%, 0% 45%);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn.active { background: white; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="pad-container" id="mainArea">
        <div class="white-stack-base" id="pad">Tap Me</div>
    </div>

    <div class="controls">
        <button id="setLips" class="btn active">💋 Lips</button>
        <button id="setTurtle" class="btn">🐢 Turtle</button>
        <button id="setKite" class="btn">🪁 Kite</button>
    </div>

    <script>
        const pad = document.getElementById('pad');
        const mainArea = document.getElementById('mainArea');
        const modeButtons = {
            lips: document.getElementById('setLips'),
            turtle: document.getElementById('setTurtle'),
            kite: document.getElementById('setKite')
        };

        let currentMode = 'lips';
        const colors = ['#ff7675', '#fdcb6e', '#00cec9', '#a29bfe', '#55efc4', '#fab1a0', '#e84393', '#0984e3'];

        Object.keys(modeButtons).forEach(mode => {
            modeButtons[mode].onclick = () => {
                currentMode = mode;
                Object.values(modeButtons).forEach(b => b.classList.remove('active'));
                modeButtons[mode].classList.add('active');
            };
        });

        const spawn = (e) => {
            if(e) e.preventDefault();

            const note = document.createElement('div');
            note.className = 'peeled-note';
            note.innerText = "I Love You";
            note.style.background = colors[Math.floor(Math.random() * colors.length)];
            mainArea.appendChild(note);

            setTimeout(() => {
                note.innerText = "";
                
                if (currentMode === 'lips') note.classList.add('lips-shape');
                else if (currentMode === 'turtle') note.classList.add('turtle-shape');
                else if (currentMode === 'kite') note.classList.add('kite-shape');

                // Spiral animation (Slower for graceful drift)
                const duration = 12 + Math.random() * 6;
                note.style.animation = `spiralRight ${duration}s forwards ease-in`;

                // Clean up once they've disappeared to the right
                setTimeout(() => note.remove(), duration * 1000);
            }, 1000);
        };

        pad.addEventListener('mousedown', spawn);
        pad.addEventListener('touchstart', spawn, {passive: false});
    </script>
</body>
</html>
