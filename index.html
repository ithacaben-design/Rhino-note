<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rhinogami Ecosystem</title>
    <style>
        :root {
            --white: #fdfdfd;
            --gray: #4a4a4a;
            --border: 1.5px solid #000;
        }
        body {
            margin: 0; background: #cbd5e0; height: 100vh; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; perspective: 2000px;
        }

        /* The Stationery Pad */
        #pad-container {
            position: absolute; bottom: 30px; right: 30px;
            width: 180px; height: 180px;
            transform: rotateX(20deg) rotateZ(-5deg);
            transform-style: preserve-3d; z-index: 1000;
        }
        .pad-sheet {
            position: absolute; width: 100%; height: 100%;
            background: var(--white); border: var(--border);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        #input-note {
            width: 100%; height: 100%; border: none; padding: 10px;
            box-sizing: border-box; resize: none; outline: none;
            background: transparent; font-weight: bold; font-size: 14px;
        }

        /* The Rhino Entity */
        .rhino {
            position: absolute; width: 100px; height: 100px;
            transform-style: preserve-3d; will-change: transform;
        }
        .rhino-body {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(-45deg);
        }
        .flap {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 1.5s;
        }
        .side {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: var(--border);
            background: var(--white); display: flex; align-items: center; 
            justify-content: center; font-size: 8px; text-align: center;
        }
        .back { background: var(--gray); transform: rotateY(180deg); }

        /* Fold Shapes */
        .f-tl { clip-path: polygon(0 0, 50% 0, 0 50%); transform-origin: 25% 25%; }
        .f-tr { clip-path: polygon(100% 0, 50% 0, 100% 50%); transform-origin: 75% 25%; }
        .f-bl { clip-path: polygon(0 100%, 50% 100%, 0 50%); transform-origin: 25% 75%; }
        .f-br { clip-path: polygon(100% 100%, 50% 100%, 100% 50%); transform-origin: 75% 75%; }

        @keyframes waddle {
            0%, 100% { transform: rotateX(60deg) rotateZ(-45deg) translateY(0); }
            50% { transform: rotateX(70deg) rotateZ(-45deg) translateY(-8px); }
        }
        .walking .rhino-body { animation: waddle 0.5s infinite; }

        .ui { position: absolute; bottom: 20px; left: 20px; z-index: 1001; }
        button { 
            padding: 12px 24px; cursor: pointer; border-radius: 8px; 
            border: 2px solid #000; background: #fff; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="pad-container">
        <div class="pad-sheet" style="transform: translateZ(-4px)"></div>
        <div class="pad-sheet">
            <textarea id="input-note" placeholder="Write a note..."></textarea>
        </div>
    </div>

    <div class="ui">
        <button onclick="spawnRhino()">Tear & Release</button>
    </div>

    <script>
        const rhinos = [];
        const speed = 1.2;

        function spawnRhino() {
            const text = document.getElementById('input-note').value || "Rhino";
            const el = document.createElement('div');
            el.className = 'rhino';
            
            // Random start position
            const rhinoData = {
                el: el,
                x: window.innerWidth - 250,
                y: window.innerHeight - 250,
                angle: Math.random() * Math.PI * 2,
                vx: 0, vy: 0,
                size: 100,
                folded: false
            };

            el.innerHTML = `
                <div class="rhino-body">
                    <div class="side">${text}</div>
                    <div class="flap f-tl"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-tr"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-bl"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-br"><div class="side"></div><div class="side back"></div></div>
                </div>`;

            document.body.appendChild(el);
            rhinos.push(rhinoData);

            // Fold animation
            setTimeout(() => {
                el.querySelectorAll('.flap').forEach((f, i) => {
                    const dir = (i % 2 === 0) ? 1 : -1;
                    f.style.transform = `rotate3d(1, ${dir}, 0, 170deg)`;
                });
                el.classList.add('walking');
                rhinoData.folded = true;
            }, 100);

            document.getElementById('input-note').value = '';
        }

        function update() {
            rhinos.forEach(r => {
                if (!r.folded) return;

                // Move logic
                r.vx = Math.cos(r.angle) * speed;
                r.vy = Math.sin(r.angle) * speed;
                r.x += r.vx;
                r.y += r.vy;

                // Wall bounce
                if (r.x < 0 || r.x > window.innerWidth - r.size) r.angle = Math.PI - r.angle;
                if (r.y < 0 || r.y > window.innerHeight - r.size) r.angle = -r.angle;

                // Collision Detection
                rhinos.forEach(other => {
                    if (r === other) return;
                    const dx = r.x - other.x;
                    const dy = r.y - other.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < r.size * 0.8) {
                        r.angle += Math.PI / 4; // Turn away
                    }
                });

                // Apply styles
                r.el.style.transform = `translate3d(${r.x}px, ${r.y}px, 0) rotateZ(${r.angle}rad)`;
            });
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
